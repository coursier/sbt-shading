name: CI
on:
  push:
    branches:
    - main
    tags:
    - "v*"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [8, 17]
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/cache-action@v8.1
    - uses: coursier/setup-action@v3.0.0
      with:
        jvm: ${{ matrix.java }}
        apps: sbt
    - name: Test sbt 1
      run: sbt sbt-shading/scripted
      if: ${{ matrix.java == '8' }}
    - name: Test sbt 2
      run: sbt '++ 3.x' scriptedTestSbt2
      if: ${{ matrix.java != '8' }}

  publish:
    if: github.event_name == 'push' && github.repository == 'coursier/sbt-shading'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/cache-action@v8.1
    - uses: coursier/setup-action@v3.0.0
      with:
        jvm: 8
        apps: sbt
    - run: .github/scripts/gpg-setup.sh
      env:
        PGP_SECRET: ${{ secrets.PUBLISH_SECRET_KEY }}
    - name: Release
      run: sbt ci-release
      env:
        PGP_SECRET: ${{ secrets.PUBLISH_SECRET_KEY }}
        PGP_PASSPHRASE: ${{ secrets.PUBLISH_SECRET_KEY_PASSWORD }}
        SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
